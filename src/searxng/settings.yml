# 只保留三個一般網頁引擎；其餘預設引擎都不載入
# https://docs.searxng.org/admin/settings/settings.html#engines-keep-only
use_default_settings:
  engines:
    keep_only:
      # - duckduckgo
      #- googlenews
      # - googlenews
      # - google
      - google news rss
    
# engines:
#   - name: googlenews
#     engine: googlenews
#     disabled: false

server:
  secret_key: "ultrasecretkey2ultrasecretkey"
  #limiter: true  # 防止你被濫用（建議開）

search:
  formats:
    - json

engines:
  - name: google news rss
    engine: rss
    shortcut: gnrss
    categories:
      - news
    paging: false
    timeout: 6.0
    url: https://news.google.com/rss/search?q={query}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant

outgoing:
  request_timeout: 10.0

  # 關鍵：避免被 Google 擋
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36