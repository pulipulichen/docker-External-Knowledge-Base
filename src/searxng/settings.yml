# 只保留三個一般網頁引擎；其餘預設引擎都不載入
# https://docs.searxng.org/admin/settings/settings.html#engines-keep-only
use_default_settings:
  engines:
    keep_only:
      # - duckduckgo
      - googlenews
      # - googlenews
    
# engines:
#   - name: googlenews
#     engine: googlenews
#     disabled: false

server:
  secret_key: "ultrasecretkey2ultrasecretkey"
  limiter: true  # 防止你被濫用（建議開）

search:
  formats:
    - html
    - json

engines:

  # --- Google News（主力） ---
  - name: googlenews
    engine: google_news
    shortcut: gon
    timeout: 8.0
    disabled: false

# 防止被 abuse（你做 API 很重要）
limiter:
  real_ip:
    header: X-Forwarded-For
  rate_limit:
    ip_limit: 5
    ip_window: 10

outgoing:
  request_timeout: 10.0

  # 關鍵：避免被 Google 擋
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36