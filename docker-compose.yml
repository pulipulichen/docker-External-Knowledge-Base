services:
  api:
    build:
      context: ./src/api/
      dockerfile: Dockerfile
    volumes:
      - ./src/api:/app/api
      - ./knowledge_base:/app/knowledge_base
      - ./src/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./src/tiktoken:/root/.cache/tiktoken
    tmpfs:
      - /tmp
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      tei:
        condition: service_started
      weaviate:
        # condition: service_healthy
        condition: service_started
      mcp_server:
        condition: service_started
      mercury-parser:
        condition: service_started
      searxng:
        condition: service_started
      markdown_converter:
        condition: service_started
    networks:
      - docker_external_knowledge_base
    environment:
      # --- 執行緒限制 (全面覆蓋) ---
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1 # 新增：針對 OpenBLAS 後端
      - VECLIB_MAXIMUM_THREADS=1 # 新增：針對 Vector 運算
      - NUMEXPR_NUM_THREADS=1 # 新增：針對 NumExpr

      # --- 關鍵修復策略 ---
      # 讓執行緒進入被動等待模式，不要佔用 CPU 空轉 (Spinning)
      # 這通常能解決 pthread_setaffinity_np 錯誤
      - OMP_WAIT_POLICY=PASSIVE
      # Scrape (/scrape): Mercury Parser HTTP API (see .env.example)
      - MERCURY_PARSER_URL=${MERCURY_PARSER_URL:-http://mercury-parser:3000}
      - MERCURY_REQUEST_TIMEOUT=${MERCURY_REQUEST_TIMEOUT:-90}
      # POST /scrape：Redis 快取 TTL（秒），預設 24 小時
      - SCRAPE_CACHE_TTL_SECONDS=${SCRAPE_CACHE_TTL_SECONDS:-86400}
      # SearXNG (used by POST /search)
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - SEARXNG_REQUEST_TIMEOUT=${SEARXNG_REQUEST_TIMEOUT:-30}
      # Ingest: file → markdown via markdown_converter service (see .env.example)
      - MARKDOWN_CONVERTER_URL=${MARKDOWN_CONVERTER_URL:-http://markdown_converter:80}
      - MARKDOWN_CONVERTER_TIMEOUT=${MARKDOWN_CONVERTER_TIMEOUT:-125}
    # deploy:
    #   mode: replicated
    #   replicas: 1
    #   resources:
    #     limits:
    #       memory: 512M

  markdown_converter:
    build:
      context: ./src/markdown_converter/
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./src/markdown_converter:/app/markdown_converter
      - ./knowledge_base:/app/knowledge_base
      - ./src/tiktoken:/root/.cache/tiktoken
      - root-caches:/root/.cache
    networks:
      - docker_external_knowledge_base
    deploy:
      mode: replcated
      replicas: 1
      
  redis:
    image: "redis:7.0.12-alpine"
    restart: on-failure
    volumes:
      - redis_data:/data
    networks:
      - docker_external_knowledge_base
    command:
      - redis-server
      - --maxmemory
      - 2gb
      - --maxmemory-policy
      - allkeys-lru

  nginx:
    image: nginx:1.21.6
    restart: on-failure
    ports:
      - "8080:80"
      # SearXNG Web UI：經由此埠連線才會帶 X-Forwarded-For / X-Real-IP，符合 botdetection
      - "40002:40002"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - searxng
    networks:
      - docker_external_knowledge_base

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9.3
    environment:
      - MODEL_ID=google/embeddinggemma-300m
      - HF_TOKEN=${HF_TOKEN}
    restart: on-failure
    ports:
      - 40001:80
    volumes:
      - ./cache/tei:/data
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    # logging:
    #   driver: "none"
    networks:
      - docker_external_knowledge_base

  weaviate:
    build:
      context: ./src/weaviate/
      dockerfile: Dockerfile
    restart: on-failure
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      - WEAVIATE_LD_API_KEY=${API_KEY}
    env_file:
      - .env
    networks:
      - docker_external_knowledge_base
  weaviate_ui:
    image: naaive/weaviate-ui:v1.0.3
    restart: on-failure
    ports:
      - 47777:7777
    depends_on:
      - weaviate
    environment:
      - WEAVIATE_URL=http://weaviate:8080
    env_file:
      - .env
    networks:
      - docker_external_knowledge_base
    # logging:
    #   driver: "none"

  # 啟動時跑 MCP 整合測試（Bearer + 單一 tool）；本機不需安裝 Python 套件
  # 用法：./test/run-mcp-test-docker-search-news.sh 等（見 test/run-mcp-test-docker-*.sh）
  # 或 export MCP_TEST_TOOL=... 後 docker compose --profile mcp-test up --build --abort-on-container-exit
  mcp_test:
    profiles:
      - mcp-test
    build:
      context: ./src/mcp_test
      dockerfile: Dockerfile
    environment:
      - MCP_URL=http://mcp_server/mcp
      - MCP_API_KEY=${API_KEY}
      - MCP_TEST_TOOL=${MCP_TEST_TOOL:-search_news}
      - MCP_TEST_NEWS_QUERY=${MCP_TEST_NEWS_QUERY:-伊朗 戰爭 美國}
      - MCP_TEST_WEB_QUERY=${MCP_TEST_WEB_QUERY:-hello world}
      - MCP_TEST_WEB_FULLTEXT=${MCP_TEST_WEB_FULLTEXT:-true}
      - MCP_TEST_WEB_LIMIT=${MCP_TEST_WEB_LIMIT:-5}
      - MCP_TEST_SCRAPE_URL=${MCP_TEST_SCRAPE_URL:-https://blog.pulipuli.info/2025/11/talk-deeply-felt-skypes-retirement.html}
      - MCP_TEST_SCRAPE_CONTENT_TYPE=${MCP_TEST_SCRAPE_CONTENT_TYPE:-}
      - MCP_TEST_SCRAPE_HEADERS=${MCP_TEST_SCRAPE_HEADERS:-}
      - MCP_TEST_KB_ID=${MCP_TEST_KB_ID:-example}
      - MCP_TEST_KB_QUERY=${MCP_TEST_KB_QUERY:-webcam}
      - MCP_TEST_KB_TOP_K=${MCP_TEST_KB_TOP_K:-5}
      - MCP_TEST_KB_SCORE_THRESHOLD=${MCP_TEST_KB_SCORE_THRESHOLD:-0.1}
    depends_on:
      api:
        condition: service_started
      mcp_server:
        condition: service_started
    networks:
      - docker_external_knowledge_base

  mcp_server:
    build:
      context: ./src/mcp_server/
      dockerfile: Dockerfile
    environment:
      - MCP_API_KEY=${API_KEY}
      # 1：uvicorn --reload（掛載的 .py 變更會重載，單 process）。0：gunicorn 四 worker（較適合併發）。
      - MCP_DEV_RELOAD=${MCP_DEV_RELOAD:-0}
    volumes:
      - ./src/mcp_server/mcp_server.py:/app/mcp_server.py
      - ./src/mcp_server/search_knowledge_base.py:/app/search_knowledge_base.py
      - ./src/mcp_server/scrape_web_page.py:/app/scrape_web_page.py
      - ./src/mcp_server/search_web.py:/app/search_web.py
      - ./src/mcp_server/search_news.py:/app/search_news.py
      - ./knowledge_base/configs:/knowledge_base_configs
    networks:
      - docker_external_knowledge_base
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
    # Mercury Parser API 服務
    # 常用於將網頁內容轉換為乾淨的內容，適合閱讀與 RSS 整合
  mercury-parser:
    # image: wangqiru/mercury-parser-api:latest
    image: pudding/docker-scrape-web-page-to-markdown:20260404.040512
    restart: unless-stopped
    # ports:
    #   - "43000:3000"
    environment:
      # 如果需要調整時區，可以取消註解
      - TZ=Asia/Taipei
    # 建議限制記憶體使用量，因為解析網頁有時較佔資源
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          memory: 512M
    networks:
      - docker_external_knowledge_base

  # 搜尋引擎：在 ./src/searxng/settings.yml 設定 use_default_settings.engines.keep_only
  # （無法只靠 compose 列引擎名稱；映像讀取 /etc/searxng/settings.yml）。
  # 可選環境變數 SEARXNG_SECRET 覆寫 server.secret_key，見 .env.example。
  searxng:
    image: searxng/searxng:2026.3.25-fe1d6d9c4
    # 僅內部連線；對外請用 nginx:40002 → 會補齊 X-Forwarded-For / X-Real-IP
    # expose:
    #   - "8080"
    ports:
      - "48080:8888"
    volumes:
      - "./src/searxng:/etc/searxng"
    environment:
      # 由專案根目錄 .env 做 Compose 變數替換即可，勿對 searxng 掛載整份 INI 風格 .env
      - SEARXNG_SECRET=${SEARXNG_SECRET:-ultrasecretkey2ultrasecretkey}
      - SEARXNG_VALKEY_URL=redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped
    # deploy:
    #   mode: replicated
    #   replicas: 1
    #   resources:
    #     limits:
    #       memory: 512M
    networks:
      - docker_external_knowledge_base

volumes:
  redis_data:
  weaviate_data:
  root-caches:

networks:
  docker_external_knowledge_base:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
